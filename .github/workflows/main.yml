name: 🍀 Generate Github Readme Content

on:
    # run automatically every 24 hours, run at 23:00 UTC.
    schedule:
        - cron: "00 22 * * *"
    workflow_dispatch:
    push:
        branches:
            - master

jobs:
    main:
        permissions:
            contents: write
        runs-on: ubuntu-latest
        timeout-minutes: 5

        steps:
            - name: 📦 Checkout the repository
              uses: actions/checkout@v6

            - name: 🧮 Generate stats card
              uses: readme-tools/github-readme-stats-action@v2
              with:
                  card: stats
                  options: username=${{ github.repository_owner }}&show_icons=true&count_private=true&hide_border=true&title_color=00bfbf&icon_color=00bfbf&text_color=c9d1d9&bg_color=0d1117
                  path: dist/stats.svg
                  token: ${{ secrets.GITHUB_TOKEN }}

            - name: 🔥 Generate top languages card
              uses: readme-tools/github-readme-stats-action@v2
              with:
                  card: top-langs
                  options: username=${{ github.repository_owner }}&layout=compact&hide_border=true&title_color=00bfbf&text_color=00bfbf&bg_color=0d1117
                  path: dist/top-langs.svg
                  token: ${{ secrets.GITHUB_TOKEN }}

            - name: ⚙ Generate Github Contribution Grid Snake
              uses: Platane/snk/svg-only@v3
              with:
                  github_user_name: ${{ github.repository_owner }}
                  outputs: |
                      dist/github-contribution-grid-snake.svg?color_snake=#00BFBF
                      dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=#008080

            - name: 🚀 Push Github Contribution Grid Snake.svg to the Output Branch
              uses: crazy-max/ghaction-github-pages@v4
              with:
                  target_branch: output
                  build_dir: dist
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
